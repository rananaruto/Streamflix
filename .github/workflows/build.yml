name: Build StreamFlix APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger bhi available hoga

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix line endings and make gradlew executable
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        chmod +x gradle/wrapper/gradle-wrapper.jar

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: StreamFlix-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-release:
    name: Build Release APK (Signed)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix line endings and make gradlew executable
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
      with:
        name: StreamFlix-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
